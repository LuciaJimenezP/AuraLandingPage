<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuraHealth – Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #4a7fa5 0%, #6baed6 30%, #9ecae1 55%, #a8b8c8 75%, #b0a8b8 100%);
    }
    a { text-decoration: none; color: inherit; }

    /* ── NAVBAR ── */
    .navbar {
      background: #fff;
      padding: 0 40px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: #1a3a6e;
    }
    .navbar-social {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .navbar-social a {
      color: #3a4a5e;
      transition: color .2s;
    }
    .navbar-social a:hover { color: #1a3a6e; }

    /* ── MAIN ── */
    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── CARD ── */
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 44px 48px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
    }
    .login-card h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 28px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }
    .form-group label {
      font-size: .88rem;
      font-weight: 600;
      color: #2d3748;
    }
    .form-group input {
      padding: 12px 16px;
      border: 1.5px solid #dde4ee;
      border-radius: 10px;
      font-family: 'Roboto', sans-serif;
      font-size: .95rem;
      color: #1a1a2e;
      background: #f8fbfd;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: #4db8c8; background: #fff; }
    .form-group input::placeholder { color: #9aacbe; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #1a3a6e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      margin-bottom: 20px;
      transition: background .2s, transform .15s;
    }
    .btn-primary:hover { background: #2155a3; transform: translateY(-1px); }

    .divider {
      text-align: center;
      font-size: .85rem;
      color: #6a7a8e;
      margin-bottom: 16px;
      position: relative;
    }
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 36%;
      height: 1px;
      background: #dde4ee;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .social-btns {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 11px;
      border: none;
      border-radius: 10px;
      background: #1a3a6e;
      color: #fff;
      font-family: 'Roboto', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-social:hover { background: #2155a3; }

    .register-link {
      text-align: center;
      font-size: .88rem;
      color: #4a5568;
    }
    .register-link a {
      color: #1a3a6e;
      font-weight: 600;
      text-decoration: underline;
    }
    .register-link a:hover { color: #2155a3; }

    @media (max-width: 500px) {
      .login-card { padding: 32px 24px; }
      .navbar { padding: 0 20px; }
    }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar">
  <a href="index.html" class="navbar-logo">
    <svg width="32" height="32" viewBox="0 0 34 34" fill="none">
      <circle cx="17" cy="17" r="17" fill="#1a3a6e"/>
      <path d="M9 17 C9 12, 14 8, 17 13 C20 8, 25 12, 25 17 C25 22, 17 27, 17 27 C17 27, 9 22, 9 17Z" fill="#4db8c8"/>
    </svg>
    AuraHealth
  </a>
  <div class="navbar-social">
    <!-- Facebook -->
    <a href="#" aria-label="Facebook">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
      </svg>
    </a>
    <!-- Instagram -->
    <a href="#" aria-label="Instagram">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
    </a>
    <!-- X / Twitter -->
    <a href="#" aria-label="X">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
  </div>
</nav>

<!-- ── MAIN ── -->
<main class="login-main">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Ingresa tu email"/>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="Ingresa tu contraseña"/>
    </div>

    <button class="btn-primary" onclick="location.href='dashboard.html'">Iniciar Sesión</button>

    <div class="divider">O inicia sesión con</div>

    <div class="social-btns">
      <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff" opacity=".8"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff" opacity=".6"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff" opacity=".9"/>
        </svg>
        Google
      </button>
      <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
        Facebook
      </button>
    </div>

    <p class="register-link">
      ¿Todavía no tienes una cuenta? <a href="register.html">Crea una ahora</a>
    </p>
  </div>
</main>

</body>
</html>
